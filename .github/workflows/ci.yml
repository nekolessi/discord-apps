name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint_typecheck_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, and build
        run: pnpm check

      - name: Verify starter bot build artifact
        run: |
          node -e "const fs=require('node:fs'); const file='bots/neko-starter-bot/dist/src/index.js'; if(!fs.existsSync(file)){console.error('Missing build artifact:', file); process.exit(1);} console.log('Verified artifact:', file);"

  python_validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bot: [neko-gif-caption-bot, neko-8ball-bot]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bots/${{ matrix.bot }}/requirements.txt

      - name: Install Python dependencies
        run: pip install -r bots/${{ matrix.bot }}/requirements.txt

      - name: Compile Python bot
        run: python -m compileall -q bots/${{ matrix.bot }}


