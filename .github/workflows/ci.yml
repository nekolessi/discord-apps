name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint_typecheck_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, and build
        run: pnpm check

      - name: Verify bot build artifacts
        run: |
          node -e "const fs=require('node:fs'); const files=['bots/neko-starter-bot/dist/src/index.js','bots/neko-fun-bot/dist/src/index.js']; const missing=files.filter((f)=>!fs.existsSync(f)); if(missing.length){console.error('Missing build artifacts:', missing.join(', ')); process.exit(1);} console.log('Verified artifacts:', files.join(', '));"
