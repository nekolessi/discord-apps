name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  statuses: write

jobs:
  lint_typecheck_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, and build
        run: pnpm check

      - name: Verify starter bot build artifact
        run: |
          node -e "const fs=require('node:fs'); const file='bots/neko-starter-bot/dist/src/index.js'; if(!fs.existsSync(file)){console.error('Missing build artifact:', file); process.exit(1);} console.log('Verified artifact:', file);"

      - name: Publish protected-branch status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const stateMap = { success: 'success', failure: 'failure', cancelled: 'error' };
            const state = stateMap['${{ job.status }}'] || 'error';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state,
              context: 'CI / lint_typecheck_build',
              description: `lint_typecheck_build ${state}`
            });

  python_validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bot: [neko-gif-caption-bot, neko-8ball-bot, neko-anon-bot, neko-catgirl-bot, neko-wordle-helper-bot]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bots/${{ matrix.bot }}/requirements.txt

      - name: Install Python dependencies
        run: pip install -r bots/${{ matrix.bot }}/requirements.txt

      - name: Compile Python bot
        run: python -m compileall -q bots/${{ matrix.bot }}

      - name: Publish protected-branch status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const stateMap = { success: 'success', failure: 'failure', cancelled: 'error' };
            const state = stateMap['${{ job.status }}'] || 'error';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state,
              context: 'CI / python_validate (${{ matrix.bot }})',
              description: `python_validate ${{ matrix.bot }} ${state}`
            });


