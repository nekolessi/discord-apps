name: Register Discord Commands

on:
  workflow_dispatch:
    inputs:
      bot:
        description: "Bot folder under bots/"
        required: true
        default: "neko-starter-bot"
        type: choice
        options:
          - neko-starter-bot
          - neko-gif-caption-bot
          - neko-8ball-bot
      scope:
        description: "Where to register commands"
        required: true
        default: "guild"
        type: choice
        options: [guild, global]

permissions:
  contents: read

jobs:
  register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve workflow inputs
        id: inputs
        env:
          BOT_INPUT: ${{ github.event.inputs.bot }}
          SCOPE_INPUT: ${{ github.event.inputs.scope }}
        run: |
          set -euo pipefail

          case "$BOT_INPUT" in
            neko-starter-bot|neko-gif-caption-bot|neko-8ball-bot)
              BOT="$BOT_INPUT"
              ;;
            *)
              echo "::error title=Invalid bot::Unsupported bot selection."
              exit 1
              ;;
          esac

          case "$SCOPE_INPUT" in
            guild|global)
              SCOPE="$SCOPE_INPUT"
              ;;
            *)
              echo "::error title=Invalid scope::Use guild or global."
              exit 1
              ;;
          esac

          echo "bot=$BOT" >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"

      - name: Register commands
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN || vars.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID || vars.DISCORD_CLIENT_ID }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID || vars.DISCORD_GUILD_ID }}
          BOT: ${{ steps.inputs.outputs.bot }}
          SCOPE: ${{ steps.inputs.outputs.scope }}
        run: |
          set -euo pipefail

          if [ ! -f "bots/${BOT}/package.json" ]; then
            echo "::error title=Invalid bot::bots/${BOT}/package.json not found"
            exit 1
          fi

          missing=0
          for k in DISCORD_TOKEN DISCORD_CLIENT_ID; do
            if [ -z "${!k:-}" ]; then
              echo "::error title=Missing $k::Set $k in repo secrets or variables"
              missing=1
            fi
          done

          if [ "${SCOPE}" = "guild" ] && [ -z "${DISCORD_GUILD_ID:-}" ]; then
            echo "::error title=Missing DISCORD_GUILD_ID::Required for guild scope"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Registering commands for bots/${BOT} with scope ${SCOPE}"

          if [ "${SCOPE}" = "global" ]; then
            pnpm --filter "./bots/${BOT}" run register:global
          else
            pnpm --filter "./bots/${BOT}" run register:guild
          fi
