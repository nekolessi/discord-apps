name: Release Bot

on:
  workflow_dispatch:
    inputs:
      bot:
        description: "Bot folder under bots/"
        required: true
        default: "neko-starter-bot"
        type: string
      version:
        description: "Version label (example: v1.0.0)"
        required: true
        default: "v1.0.0"
        type: string
      publish_release:
        description: "Publish a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect bot type
        id: detect
        env:
          BOT: ${{ github.event.inputs.bot }}
        run: |
          set -euo pipefail
          if [ -f "bots/${BOT}/package.json" ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
          elif [ -f "bots/${BOT}/requirements.txt" ]; then
            echo "type=python" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Invalid bot::No package.json or requirements.txt in bots/${BOT}"
            exit 1
          fi

      - name: Setup pnpm
        if: ${{ steps.detect.outputs.type == 'node' }}
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: ${{ steps.detect.outputs.type == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Node dependencies
        if: ${{ steps.detect.outputs.type == 'node' }}
        run: pnpm install --frozen-lockfile

      - name: Build selected Node bot
        if: ${{ steps.detect.outputs.type == 'node' }}
        env:
          BOT: ${{ github.event.inputs.bot }}
        run: pnpm --filter "./bots/${BOT}" build

      - name: Setup Python
        if: ${{ steps.detect.outputs.type == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bots/${{ github.event.inputs.bot }}/requirements.txt

      - name: Validate selected Python bot
        if: ${{ steps.detect.outputs.type == 'python' }}
        env:
          BOT: ${{ github.event.inputs.bot }}
        run: |
          set -euo pipefail
          pip install -r "bots/${BOT}/requirements.txt"
          python -m compileall -q "bots/${BOT}"

      - name: Create release zip
        id: package
        env:
          BOT: ${{ github.event.inputs.bot }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ARTIFACT="${BOT}-${VERSION}.zip"
          zip -r "dist/${ARTIFACT}" \
            "bots/${BOT}" \
            "LICENSE" \
            -x "*/.venv/*" "*/__pycache__/*" "*/.cache/*" "*/node_modules/*"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact }}
          path: dist/${{ steps.package.outputs.artifact }}

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.bot }}-${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.bot }} ${{ github.event.inputs.version }}
          files: dist/${{ steps.package.outputs.artifact }}
